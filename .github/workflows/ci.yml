name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      # agentlib now resolves from the module proxy like any other dependency,
      # so this repo builds on its own — no sibling checkout required.
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: pwsh -NoProfile -File scripts/build.ps1 -Task test

      # Both release architectures are compiled here, not just the host one:
      # arm64 ships to users, so a break in it must fail CI, not the release.
      - name: Build both release architectures
        run: |
          foreach ($arch in @("amd64", "arm64")) {
            pwsh -NoProfile -File scripts/build.ps1 -Task build -Arch $arch
          }
